name: Lighthouse & Accessibility CI

on:
  pull_request:
    branches: ['**']

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GA4_ID: ci_placeholder
          NEXT_PUBLIC_GTM_ID: ci_placeholder
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ci_placeholder
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ci_placeholder
          NEXT_PUBLIC_EMAILJS_CONFIRM_TEMPLATE_ID: ci_placeholder
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ci_placeholder

      - name: Serve and audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
