          - heading "1. Purpose" [level=2] [ref=e30]
          - paragraph [ref=e31]: This document provides a transparent view of Reality Anchors pricing assumptions, baseline models, and subscription structures. Its purpose is to support buyer due diligence, provide contractual stability, and establish a clear causal link between platform value delivery and subscription cost.
          - paragraph [ref=e32]: Pricing is not based on self-reported scrap rates or percentage-of-savings models. Instead, it references industry-typical ranges and applies conservative deltas to arrive at a modeled value from which subscription tiers are derived.
        - generic [ref=e33]:
          - heading "2. Baseline Model Assumptions (Scrap + Rework)" [level=2] [ref=e34]
