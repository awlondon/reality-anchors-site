      - heading "The execution validation layer between planning and outcomes." [level=1] [ref=e23]
      - paragraph [ref=e24]: "Upstream systems generate intent — schedules, cut lists, specifications. Downstream reality is irreversible — cuts, bends, welds, pours. The platform sits at the point of execution: guiding the action, validating it against the spec, measuring against reality anchors in-frame, and recording the outcome."
