    - generic [ref=e100]:
      - heading "Built for the shop floor" [level=2] [ref=e101]
      - paragraph [ref=e102]: "Infrastructure decisions that reflect how fabrication actually works: intermittent connectivity, dusty environments, shift changes, and compliance audits."
      - generic [ref=e103]:
        - generic [ref=e104]:
          - heading "Offline-first architecture" [level=3] [ref=e105]
          - paragraph [ref=e106]: Full execution capability with no network dependency. Data syncs when connectivity returns — no interruption to bench operations.
        - generic [ref=e107]:
          - heading "Edge inference" [level=3] [ref=e108]
          - paragraph [ref=e109]: Deterministic on-device measurement and validation run at the workstation. Decisions happen in milliseconds, not cloud round-trips.
        - generic [ref=e110]:
          - heading "Reality anchor measurement" [level=3] [ref=e111]
          - paragraph [ref=e112]: Any identified object of known dimensions can establish scale in-frame. The platform uses that measured reference as a ruler for everything else it validates.
        - generic [ref=e113]:
          - heading "Immutable audit trail" [level=3] [ref=e114]
          - paragraph [ref=e115]: Every event is tamper-evident and append-only. Operator actions, machine readings, and validation outcomes form a continuous, reproducible record.
        - generic [ref=e116]:
          - heading "Versioned machine profiles" [level=3] [ref=e117]
          - paragraph [ref=e118]: Machine calibration data is tracked over time. Drift is visible, and profile changes require controlled release — no silent overrides.
        - generic [ref=e119]:
          - heading "Role-based access" [level=3] [ref=e120]
          - paragraph [ref=e121]: Operators, supervisors, QA, and admins see different surfaces. Governance controls are built in, not bolted on.
        - generic [ref=e122]:
          - heading "Structured exports" [level=3] [ref=e123]
          - paragraph [ref=e124]: Per-run reports, per-job trace logs, exception registries, and calibration summaries export in formats your ERP and QA systems expect.
